<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cybersecurity Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #fff;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 720px;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header h1 {
    font-size: 2rem;
    color: #00ff41;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .header p {
    color: #888;
    font-size: 0.9rem;
  }

  .progress-bar-wrap {
    background: #1c1c1c;
    border-radius: 4px;
    height: 6px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: #00ff41;
    transition: width 0.4s ease;
    border-radius: 4px;
  }

  .question-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
  }

  .question-number {
    color: #00ff41;
    font-size: 0.8rem;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .question-text {
    font-size: 1.15rem;
    line-height: 1.6;
    margin-bottom: 28px;
    color: #e6edf3;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95rem;
    color: #e6edf3;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: #00ff41;
    background: #0a1a0a;
    transform: translateX(4px);
  }

  .option.correct {
    border-color: #00ff41;
    background: #0a2e0a;
    color: #00ff41;
  }

  .option.wrong {
    border-color: #ff4444;
    background: #2e0a0a;
    color: #ff4444;
  }

  .option:disabled {
    cursor: default;
  }

  .feedback {
    margin-top: 20px;
    padding: 14px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.5;
    display: none;
  }

  .feedback.correct {
    background: #0a2e0a;
    border: 1px solid #00ff41;
    color: #00ff41;
    display: block;
  }

  .feedback.wrong {
    background: #2e0a0a;
    border: 1px solid #ff4444;
    color: #ff6666;
    display: block;
  }

  .next-btn {
    margin-top: 24px;
    background: #00ff41;
    color: #0d1117;
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    display: none;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 1px;
  }

  .next-btn:hover {
    background: #00cc33;
    transform: translateY(-2px);
  }

  .results {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    display: none;
  }

  .results h2 {
    font-size: 1.8rem;
    color: #00ff41;
    margin-bottom: 8px;
  }

  .results .subtitle {
    color: #888;
    margin-bottom: 36px;
    font-size: 0.9rem;
  }

  .score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #00ff41;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 36px;
  }

  .score-number {
    font-size: 2.5rem;
    font-weight: bold;
    color: #00ff41;
  }

  .score-label {
    font-size: 0.75rem;
    color: #888;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 36px;
  }

  .stat {
    text-align: center;
  }

  .stat-number {
    font-size: 2rem;
    font-weight: bold;
    display: block;
  }

  .stat-number.green { color: #00ff41; }
  .stat-number.red { color: #ff4444; }

  .stat-label {
    color: #888;
    font-size: 0.8rem;
  }

  .grade {
    font-size: 1rem;
    color: #e6edf3;
    margin-bottom: 28px;
    padding: 16px;
    background: #0d1117;
    border-radius: 8px;
    border: 1px solid #30363d;
  }

  .restart-btn {
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    border-radius: 8px;
    padding: 12px 32px;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 1px;
  }

  .restart-btn:hover {
    background: #0a2e0a;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>// CYBER QUIZ</h1>
    <p>Test your cybersecurity knowledge</p>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="question-number" id="questionNumber"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT &rarr;</button>
  </div>

  <div class="results" id="results">
    <h2>// RESULTS</h2>
    <p class="subtitle">Quiz complete</p>
    <div class="score-ring">
      <span class="score-number" id="scorePercent"></span>
      <span class="score-label">score</span>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-number green" id="correctCount"></span>
        <span class="stat-label">Correct</span>
      </div>
      <div class="stat">
        <span class="stat-number red" id="wrongCount"></span>
        <span class="stat-label">Wrong</span>
      </div>
    </div>
    <div class="grade" id="gradeText"></div>
    <button class="restart-btn" onclick="restart()">RESTART QUIZ</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "What does SQL injection allow an attacker to do?",
    options: ["Crash a web server", "Execute arbitrary database queries", "Intercept network traffic", "Escalate system privileges"],
    answer: 1,
    explanation: "SQL injection lets an attacker manipulate database queries by injecting malicious SQL code into input fields."
  },
  {
    q: "Which MITRE ATT&CK technique ID is associated with Brute Force attacks?",
    options: ["T1059", "T1190", "T1110", "T1078"],
    answer: 2,
    explanation: "T1110 covers Brute Force under the Credential Access tactic in MITRE ATT&CK."
  },
  {
    q: "What is the purpose of a WAF?",
    options: ["Encrypt network traffic", "Filter malicious HTTP requests", "Manage firewall rules", "Monitor system logs"],
    answer: 1,
    explanation: "A Web Application Firewall (WAF) inspects and filters HTTP traffic to block common web attacks like XSS and SQL injection."
  },
  {
    q: "Which hashing algorithm is considered cryptographically broken?",
    options: ["SHA-256", "bcrypt", "MD5", "SHA-3"],
    answer: 2,
    explanation: "MD5 is considered broken because it is vulnerable to collision attacks — two different inputs can produce the same hash."
  },
  {
    q: "What does a man-in-the-middle attack do?",
    options: ["Floods a server with requests", "Intercepts communication between two parties", "Injects code into a database", "Exploits a buffer overflow"],
    answer: 1,
    explanation: "A MITM attack positions the attacker between two communicating parties, allowing them to eavesdrop or modify traffic."
  },
  {
    q: "In the CIA triad, what does Integrity mean?",
    options: ["Data is accessible when needed", "Data is only seen by authorised users", "Data has not been tampered with", "Data is encrypted at rest"],
    answer: 2,
    explanation: "Integrity ensures that data has not been modified or tampered with — either accidentally or maliciously."
  },
  {
    q: "What is a zero-day vulnerability?",
    options: ["A vulnerability with no known fix yet", "A vulnerability discovered on day zero of deployment", "A vulnerability that requires zero skills to exploit", "A vulnerability in outdated software"],
    answer: 0,
    explanation: "A zero-day is a vulnerability that is unknown to the vendor and has no patch available, giving defenders zero days to respond."
  },
  {
    q: "Which port does HTTPS use by default?",
    options: ["80", "8080", "443", "22"],
    answer: 2,
    explanation: "HTTPS uses port 443 by default. Port 80 is HTTP, port 22 is SSH, and 8080 is often used for alternative HTTP services."
  },
  {
    q: "What is the goal of a penetration test?",
    options: ["To monitor network traffic continuously", "To simulate an attack and identify vulnerabilities before attackers do", "To install security patches", "To train employees on phishing"],
    answer: 1,
    explanation: "A penetration test simulates a real attack to identify security weaknesses before malicious actors can exploit them."
  },
  {
    q: "What does OWASP WSTG stand for?",
    options: ["Open Web Application Security Project Web Security Testing Guide", "Official Web Attack Security Testing Guidelines", "Open Wireless Application Security Testing Group", "Operational Web Security Threat Guide"],
    answer: 0,
    explanation: "OWASP WSTG is the Web Security Testing Guide — a comprehensive guide for testing the security of web applications."
  },
  {
    q: "Which type of attack involves sending more data than a buffer can hold?",
    options: ["SQL injection", "Cross-site scripting", "Buffer overflow", "Directory traversal"],
    answer: 2,
    explanation: "A buffer overflow occurs when a program writes more data to a buffer than it can hold, potentially allowing arbitrary code execution."
  },
  {
    q: "What is the main risk of exposing port 3389 on the internet?",
    options: ["It allows unauthenticated file sharing", "RDP is vulnerable to brute force and known exploits like BlueKeep", "It disables the firewall", "It exposes the database"],
    answer: 1,
    explanation: "Port 3389 is used by RDP (Remote Desktop Protocol). Exposing it publicly makes it a constant target for brute force attacks and known RDP vulnerabilities."
  },
  {
    q: "What is the principle of least privilege?",
    options: ["Users should have the minimum access needed to do their job", "Admins should never use personal accounts", "Passwords should be as short as possible", "Systems should run with root access by default"],
    answer: 0,
    explanation: "Least privilege means giving users and systems only the permissions they need — nothing more. It limits the blast radius if an account is compromised."
  },
  {
    q: "In cloud environments, what does IAM stand for?",
    options: ["Internet Access Manager", "Identity and Access Management", "Internal Application Monitor", "Intrusion Alert Module"],
    answer: 1,
    explanation: "IAM (Identity and Access Management) controls who can access what resources in a cloud environment. Misconfigured IAM is one of the most common causes of cloud breaches."
  },
  {
    q: "What is the purpose of Volatility in cybersecurity?",
    options: ["Network packet capture", "Memory forensics analysis", "Vulnerability scanning", "Password cracking"],
    answer: 1,
    explanation: "Volatility is a memory forensics framework used to analyse RAM dumps during incident response to find malware, encryption keys and attacker artifacts."
  },
  {
    q: "What does a SOC analyst do when an alert fires?",
    options: ["Immediately block the source IP", "Determine if the alert is a true or false positive", "Restart the affected server", "Notify the press"],
    answer: 1,
    explanation: "The first step is triage — determining whether the alert represents a real threat or a false positive before taking any action."
  },
  {
    q: "What is a SIEM used for in a SOC?",
    options: ["Encrypting network traffic", "Collecting and correlating log data to detect threats", "Scanning for open ports", "Managing user passwords"],
    answer: 1,
    explanation: "A SIEM (Security Information and Event Management) system aggregates logs from across the environment and uses correlation rules to surface potential threats."
  },
  {
    q: "What does MTTR stand for in incident response?",
    options: ["Mean Time To Respond", "Maximum Threat Threshold Rating", "Malware Triage and Threat Report", "Mean Time To Remediate"],
    answer: 3,
    explanation: "MTTR stands for Mean Time To Remediate — the average time it takes to fully resolve a security incident after it is detected."
  },
  {
    q: "Which log source would you check first when investigating a suspected brute force SSH attack?",
    options: ["Web server access logs", "Auth logs (/var/log/auth.log)", "DNS query logs", "Application error logs"],
    answer: 1,
    explanation: "Auth logs record all authentication attempts on Linux systems. Failed SSH login attempts appear here and are the primary source for investigating brute force attacks."
  },
  {
    q: "What is the difference between an IDS and an IPS?",
    options: ["IDS blocks traffic, IPS only detects", "IDS detects threats, IPS detects and blocks them", "They are the same thing", "IPS only works on endpoints"],
    answer: 1,
    explanation: "An IDS (Intrusion Detection System) alerts on suspicious activity. An IPS (Intrusion Prevention System) can also block the traffic automatically."
  },
  {
    q: "In NIST SP 800-61, what are the four phases of incident response?",
    options: ["Identify, Protect, Detect, Respond", "Preparation, Detection, Containment, Recovery", "Scan, Exploit, Report, Patch", "Triage, Escalate, Resolve, Document"],
    answer: 1,
    explanation: "NIST SP 800-61 defines four phases: Preparation, Detection and Analysis, Containment/Eradication/Recovery, and Post-Incident Activity."
  },
  {
    q: "What does a SOC playbook define?",
    options: ["How to configure firewalls", "Step-by-step response procedures for specific incident types", "Which employees have admin access", "How to write detection rules"],
    answer: 1,
    explanation: "A SOC playbook documents the exact steps an analyst should follow when responding to a specific type of incident, ensuring consistent and efficient response."
  },
  {
    q: "What is threat hunting in a SOC context?",
    options: ["Waiting for alerts to fire and responding", "Proactively searching for threats that evaded automated detection", "Running vulnerability scans on production systems", "Monitoring social media for threat actors"],
    answer: 1,
    explanation: "Threat hunting is a proactive process where analysts search for attacker activity that bypassed automated controls — rather than waiting for an alert to trigger."
  },
  {
    q: "Which MITRE ATT&CK tactic comes after Initial Access?",
    options: ["Exfiltration", "Execution", "Impact", "Collection"],
    answer: 1,
    explanation: "After gaining Initial Access, attackers typically move to Execution — running malicious code on the target system to establish a foothold."
  },
  {
    q: "What does IOC stand for in threat intelligence?",
    options: ["Internal Operations Center", "Indicator of Compromise", "Intrusion on Connection", "Index of Correlation"],
    answer: 1,
    explanation: "An IOC (Indicator of Compromise) is evidence that a system has been attacked — such as a malicious IP address, file hash, domain or registry key."
  },
];

let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;

function load() {
  answered = false;
  const q = questions[current];
  document.getElementById("questionNumber").textContent = `QUESTION ${current + 1} OF ${questions.length}`;
  document.getElementById("questionText").textContent = q.q;
  document.getElementById("feedback").className = "feedback";
  document.getElementById("feedback").textContent = "";
  document.getElementById("nextBtn").style.display = "none";

  const pct = (current / questions.length) * 100;
  document.getElementById("progressBar").style.width = pct + "%";

  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => select(i, btn);
    optDiv.appendChild(btn);
  });
}

function select(index, btn) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const allBtns = document.querySelectorAll(".option");
  allBtns.forEach(b => b.disabled = true);

  const feedback = document.getElementById("feedback");
  const nextBtn = document.getElementById("nextBtn");

  if (index === q.answer) {
    btn.classList.add("correct");
    feedback.className = "feedback correct";
    feedback.textContent = "✓ Correct — " + q.explanation;
    correct++;
  } else {
    btn.classList.add("wrong");
    allBtns[q.answer].classList.add("correct");
    feedback.className = "feedback wrong";
    feedback.textContent = "✗ Wrong — " + q.explanation;
    wrong++;
  }

  nextBtn.style.display = "inline-block";
  nextBtn.textContent = current === questions.length - 1 ? "SEE RESULTS →" : "NEXT →";
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    load();
  }
}

function showResults() {
  document.getElementById("questionCard").style.display = "none";
  document.getElementById("results").style.display = "block";
  document.getElementById("progressBar").style.width = "100%";

  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById("scorePercent").textContent = pct + "%";
  document.getElementById("correctCount").textContent = correct;
  document.getElementById("wrongCount").textContent = wrong;

  let grade = "";
  if (pct === 100) grade = "Perfect score. You know your stuff.";
  else if (pct >= 80) grade = "Strong result. You have solid cybersecurity knowledge.";
  else if (pct >= 60) grade = "Good effort. A few gaps worth looking into.";
  else if (pct >= 40) grade = "Keep studying. The fundamentals are there but need work.";
  else grade = "This field has a lot to offer. Keep at it.";

  document.getElementById("gradeText").textContent = grade;
}

function restart() {
  current = 0;
  correct = 0;
  wrong = 0;
  answered = false;
  document.getElementById("questionCard").style.display = "block";
  document.getElementById("results").style.display = "none";
  load();
}

load();
</script>
</body>
</html>
